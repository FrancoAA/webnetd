<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>webnetd</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%; overflow: hidden;
    background: #1c1c1e;
    font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
    color: #d1d1d1;
  }

  #app { display: none; flex-direction: column; height: 100%; position: relative; }
  #app.active { display: flex; }

  #terminal { flex: 1; overflow: hidden; margin-bottom: 84px; }

  /* Scrollbar styling */
  .xterm-viewport::-webkit-scrollbar { width: 6px; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
  }
  .xterm-viewport::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.18);
  }
  .xterm-viewport { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

  /* Floating input container */
  #input-container {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    z-index: 10;
    background: #2c2c2e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  /* Top row: input + buttons */
  #input-row {
    display: flex; align-items: center; gap: 0;
    padding: 6px 6px 6px 14px;
  }
  #cmd-input {
    flex: 1; padding: 8px 0;
    font: 13px 'Menlo', 'Monaco', 'Courier New', monospace;
    background: transparent; color: #d1d1d1;
    border: none; outline: none;
  }
  #cmd-input::placeholder { color: #48484a; }

  #upload-btn, #send-btn {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: #636366;
    border: none; border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s ease, background 0.15s ease;
    flex-shrink: 0;
  }
  #upload-btn:hover, #send-btn:hover {
    color: #d1d1d1;
    background: rgba(255,255,255,0.06);
  }
  #upload-btn svg { width: 16px; height: 16px; fill: currentColor; }
  #send-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* Bottom row: toolbar */
  #toolbar {
    display: flex; align-items: center;
    padding: 4px 14px 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  #status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #636366;
  }
  #status.error { cursor: pointer; }
  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #636366;
    flex-shrink: 0;
  }
  #status-dot.connecting {
    background: #636366;
    animation: pulse 1.5s ease-in-out infinite;
  }
  #status-dot.connected {
    background: #5ac85a;
    animation: pulse 2.5s ease-in-out infinite;
  }
  #status-dot.error {
    background: #e06060;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  /* Hotkey buttons */
  #hotkeys {
    display: flex; align-items: center; gap: 4px;
    margin: 0 auto;
  }
  .hotkey {
    padding: 2px 8px;
    font: 11px 'Menlo', 'Monaco', 'Courier New', monospace;
    color: #636366; background: transparent;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px; cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    user-select: none; -webkit-user-select: none;
  }
  .hotkey:hover { color: #8e8e93; border-color: rgba(255,255,255,0.12); }
  .hotkey.active {
    color: #d1d1d1;
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.16);
  }
  #toolbar-label {
    margin-left: auto;
    font-size: 11px; color: #48484a;
  }

  /* Login screen */
  #login-screen {
    display: none; height: 100%;
    justify-content: center; align-items: center;
  }
  #login-box {
    background: #232325;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px; padding: 36px; text-align: center;
    min-width: 300px;
  }
  #login-box h1 {
    color: #d1d1d1; margin-bottom: 6px;
    font-size: 16px; font-weight: 500;
    letter-spacing: 0.5px;
  }
  #login-box p { color: #636366; margin-bottom: 20px; font-size: 12px; }
  #login-box input {
    width: 100%; padding: 10px; font-size: 18px; text-align: center;
    letter-spacing: 6px;
    background: #1c1c1e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px; color: #d1d1d1; outline: none;
    transition: border-color 0.15s ease;
  }
  #login-box input:focus { border-color: rgba(255,255,255,0.2); }
  #login-box button {
    margin-top: 14px; width: 100%; padding: 9px;
    background: transparent;
    color: #8e8e93;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px; font-size: 13px; cursor: pointer;
    font-family: inherit;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  #login-box button:hover { color: #d1d1d1; border-color: rgba(255,255,255,0.16); }
  #login-error { color: #e06060; margin-top: 10px; font-size: 12px; display: none; }

  /* Drag-and-drop overlay */
  #drop-overlay {
    display: none; position: fixed; inset: 0; z-index: 30;
    background: rgba(0,0,0,0.5);
    justify-content: center; align-items: center;
    pointer-events: none;
  }
  #drop-overlay.active { display: flex; }
  #drop-overlay-label {
    font-size: 14px; color: #8e8e93;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 10px; padding: 40px 60px;
  }
</style>
</head>
<body>

<div id="login-screen">
  <div id="login-box">
    <h1>webnetd</h1>
    <p>Enter the PIN displayed on the server</p>
    <form id="login-form">
      <input type="text" id="pin-input" maxlength="6" pattern="[0-9]{6}"
             placeholder="000000" autocomplete="off" inputmode="numeric">
      <button type="submit">Connect</button>
    </form>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <div id="terminal"></div>
  <div id="input-container">
    <div id="input-row">
      <input type="text" id="cmd-input" placeholder="Type a command..." autocomplete="off" spellcheck="false">
      <button id="upload-btn" title="Upload file">
        <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
      </button>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
      </button>
    </div>
    <div id="toolbar">
      <div id="status">
        <span id="status-dot" class="connecting"></span>
        <span id="status-text">connecting</span>
      </div>
      <div id="hotkeys">
        <button class="hotkey" data-key="tab">Tab</button>
        <button class="hotkey" data-key="esc">Esc</button>
        <button class="hotkey modifier" data-key="ctrl">Ctrl</button>
        <button class="hotkey modifier" data-key="alt">Alt</button>
      </div>
      <span id="toolbar-label">webnetd</span>
    </div>
  </div>
</div>

<input type="file" id="file-input" style="display:none">
<div id="drop-overlay">
  <div id="drop-overlay-label">Drop file to upload</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script>
(function() {
  var AUTH_ENABLED = {{.AuthEnabled}};
  var authToken = '';
  var ws = null;
  var disposables = [];

  var loginScreen = document.getElementById('login-screen');
  var loginForm = document.getElementById('login-form');
  var pinInput = document.getElementById('pin-input');
  var loginError = document.getElementById('login-error');
  var app = document.getElementById('app');
  var statusEl = document.getElementById('status');
  var statusDot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var terminalEl = document.getElementById('terminal');
  var cmdInput = document.getElementById('cmd-input');
  var sendBtn = document.getElementById('send-btn');

  // Upload elements
  var uploadBtn = document.getElementById('upload-btn');
  var fileInput = document.getElementById('file-input');
  var dropOverlay = document.getElementById('drop-overlay');
  var toolbarLabel = document.getElementById('toolbar-label');

  var term = new Terminal({
    cursorBlink: true,
    fontSize: 13,
    fontFamily: 'Menlo, Monaco, "Courier New", monospace',
    theme: {
      background: '#1c1c1e',
      foreground: '#d1d1d1',
      cursor: '#8e8e93',
      cursorAccent: '#1c1c1e',
      selectionBackground: 'rgba(255,255,255,0.1)',
    },
  });

  var fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());

  // --- Command input bar ---
  function sendCommand() {
    var cmd = cmdInput.value;
    if (cmd === '' || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(new TextEncoder().encode(cmd + '\n'));
    cmdInput.value = '';
    cmdInput.focus();
  }

  sendBtn.onclick = sendCommand;
  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendCommand();
    }
  });

  // --- Hotkey buttons ---
  var modifiers = { ctrl: false, alt: false };

  function sendKey(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(new TextEncoder().encode(data));
    }
  }

  function clearModifiers() {
    modifiers.ctrl = false;
    modifiers.alt = false;
    document.querySelectorAll('.hotkey.modifier').forEach(function(btn) {
      btn.classList.remove('active');
    });
  }

  document.getElementById('hotkeys').addEventListener('click', function(e) {
    var btn = e.target.closest('.hotkey');
    if (!btn) return;
    var key = btn.dataset.key;

    if (key === 'ctrl' || key === 'alt') {
      // Toggle modifier
      modifiers[key] = !modifiers[key];
      btn.classList.toggle('active', modifiers[key]);
      return;
    }

    if (key === 'tab') {
      if (modifiers.ctrl) { sendKey('\x09'); }  // Ctrl+Tab is still just tab in terminal
      else { sendKey('\x09'); }
    } else if (key === 'esc') {
      sendKey('\x1b');
    }

    clearModifiers();
  });

  // Apply modifiers to regular key input from cmd-input
  cmdInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') return; // handled above
    if (!modifiers.ctrl && !modifiers.alt) return;

    e.preventDefault();
    var ch = e.key;
    if (ch.length !== 1) return;

    if (modifiers.ctrl) {
      // Ctrl+key: send char code 1-26 for a-z
      var code = ch.toLowerCase().charCodeAt(0) - 96;
      if (code >= 1 && code <= 26) {
        sendKey(String.fromCharCode(code));
      }
    } else if (modifiers.alt) {
      // Alt+key: send ESC prefix then the character
      sendKey('\x1b' + ch);
    }

    clearModifiers();
  });

  // --- Auth flow ---
  if (AUTH_ENABLED) {
    loginScreen.style.display = 'flex';
    pinInput.focus();

    loginForm.onsubmit = function(e) {
      e.preventDefault();
      loginError.style.display = 'none';
      var pin = pinInput.value.trim();
      if (pin.length !== 6) {
        loginError.textContent = 'PIN must be 6 digits';
        loginError.style.display = 'block';
        return;
      }

      var body = new URLSearchParams();
      body.append('pin', pin);

      fetch('/login', { method: 'POST', body: body })
        .then(function(res) {
          if (!res.ok) throw new Error('Invalid PIN');
          return res.json();
        })
        .then(function(data) {
          authToken = data.token;
          loginScreen.style.display = 'none';
          startTerminal();
        })
        .catch(function(err) {
          loginError.textContent = err.message;
          loginError.style.display = 'block';
          pinInput.value = '';
          pinInput.focus();
        });
    };
  } else {
    startTerminal();
  }

  function startTerminal() {
    app.classList.add('active');
    term.open(terminalEl);
    fitAddon.fit();
    window.addEventListener('resize', function() { fitAddon.fit(); });
    connect();
    cmdInput.focus();
  }

  function connect() {
    // Dispose previous event listeners to prevent duplicates on reconnect
    disposables.forEach(function(d) { d.dispose(); });
    disposables = [];

    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var wsUrl = proto + '//' + location.host + '/ws';
    if (authToken) {
      wsUrl += '?token=' + encodeURIComponent(authToken);
    }
    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      statusDot.className = 'connected';
      statusText.textContent = 'connected';
      statusEl.className = '';
      sendResize();
    };

    ws.onmessage = function(ev) {
      if (ev.data instanceof ArrayBuffer) {
        term.write(new Uint8Array(ev.data));
      } else {
        term.write(ev.data);
      }
    };

    ws.onclose = function() {
      statusDot.className = 'error';
      statusText.textContent = 'disconnected';
      statusEl.className = 'error';
      term.write('\r\n\x1b[31m[connection closed]\x1b[0m\r\n');
    };

    ws.onerror = function() {
      statusDot.className = 'error';
      statusText.textContent = 'error';
      statusEl.className = 'error';
    };

    // Direct xterm input also still works (clicking on terminal)
    disposables.push(term.onData(function(data) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(data));
      }
    }));

    function sendResize() {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'resize',
          data: { rows: term.rows, cols: term.cols }
        }));
      }
    }

    disposables.push(term.onResize(function() { sendResize(); }));

    statusEl.onclick = function() {
      if (ws && ws.readyState === WebSocket.CLOSED) {
        statusDot.className = 'connecting';
        statusText.textContent = 'connecting';
        statusEl.className = '';
        term.reset();
        connect();
      }
    };
  }

  // --- File upload ---
  var dragCounter = 0;
  var uploadTimer = null;

  // Upload button opens file picker directly
  uploadBtn.onclick = function() { fileInput.click(); };

  fileInput.onchange = function() {
    if (fileInput.files.length > 0) {
      doUpload(fileInput.files[0]);
      fileInput.value = '';
    }
  };

  // Window-level drag and drop
  document.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    if (dragCounter === 1) dropOverlay.classList.add('active');
  });

  document.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dragCounter--;
    if (dragCounter === 0) dropOverlay.classList.remove('active');
  });

  document.addEventListener('dragover', function(e) {
    e.preventDefault();
  });

  document.addEventListener('drop', function(e) {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');
    if (e.dataTransfer.files.length > 0) {
      doUpload(e.dataTransfer.files[0]);
    }
  });

  function showUploadStatus(msg, type) {
    if (uploadTimer) clearTimeout(uploadTimer);
    toolbarLabel.textContent = msg;
    toolbarLabel.style.color = type === 'ok' ? '#5ac85a' : type === 'err' ? '#e06060' : '#8e8e93';
    uploadTimer = setTimeout(function() {
      toolbarLabel.textContent = 'webnetd';
      toolbarLabel.style.color = '';
    }, 4000);
  }

  function doUpload(file) {
    showUploadStatus('uploading ' + file.name + '...', '');

    var form = new FormData();
    form.append('file', file);

    var url = '/upload';
    if (authToken) {
      url += '?token=' + encodeURIComponent(authToken);
    }

    fetch(url, { method: 'POST', body: form })
      .then(function(res) {
        if (!res.ok) throw new Error('Upload failed: ' + res.statusText);
        return res.json();
      })
      .then(function(data) {
        showUploadStatus(data.name + ' (' + formatSize(data.size) + ') uploaded', 'ok');
      })
      .catch(function(err) {
        showUploadStatus(err.message, 'err');
      });
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }
})();
</script>
</body>
</html>
